## @section Global parameters
# Test patch release
## @param name [string] Application name, used as prefix for all Kubernetes resources. **Required.**
name: "app-front-nginx"
## @param namespace [string] Kubernetes namespace to deploy into. **Required.**
namespace: "default"
## @param timezone [string] Timezone injected as TZ environment variable.
timezone: "America/Sao_Paulo"

## @section Deployment parameters
deployment:
  ## @param deployment.revisionHistoryLimit Number of old ReplicaSets to retain.
  revisionHistoryLimit: 1
  ## @param deployment.progressDeadlineSeconds Seconds before a stalled deployment is considered failed.
  progressDeadlineSeconds: 3600

  strategy:
    ## @param deployment.strategy.type Deployment strategy: `RollingUpdate` or `Recreate`.
    type: RollingUpdate
    rollingUpdate:
      ## @param deployment.strategy.rollingUpdate.maxSurge Max extra pods during a rolling update.
      maxSurge: 1
      ## @param deployment.strategy.rollingUpdate.maxUnavailable Max unavailable pods during a rolling update.
      maxUnavailable: 1

  image:
    ## @param deployment.image.repository Container image repository.
    repository: "nginx"
    ## @param deployment.image.tag Container image tag.
    tag: "latest"
    ## @param deployment.image.pullPolicy Image pull policy.
    pullPolicy: IfNotPresent

  ## @param deployment.resources Resource requests and limits for the main container.
  resources: {}

  ports:
    http:
      ## @param deployment.ports.http.containerPort HTTP port the container listens on.
      containerPort: 80

  probes:
    readiness:
      path: /healthcheck
      port: 80
      failureThreshold: 4
      periodSeconds: 15
      successThreshold: 1
      timeoutSeconds: 10
    startup:
      path: /healthcheck
      port: 80
      successThreshold: 1
      failureThreshold: 8
      periodSeconds: 10
    liveness:
      path: /healthcheck
      port: 80
      successThreshold: 1
      failureThreshold: 4
      periodSeconds: 15
      timeoutSeconds: 10

  nginx:
    ## @param deployment.nginx.workerProcesses NGINX worker processes.
    workerProcesses: auto
    ## @param deployment.nginx.clientMaxBodySize NGINX client max body size.
    clientMaxBodySize: "100M"
    ## @param deployment.nginx.gzip Enable gzip in NGINX.
    gzip: false
    ## @param deployment.nginx.extraConfig Extra NGINX configuration directives.
    extraConfig: ""

  extraVolumeMounts: []
  extraVolumes: []

  nodeSelector:
    nodeTypePoolSpec: ""

  tolerations: []
  terminationGracePeriodSeconds: 120

  volumeMounts:
    nginx:
      mountPath: "/etc/nginx/conf.d"
    ssl:
      mountPath: "/etc/nginx/ssl"
    ssl-default:
      mountPath: "/etc/nginx/ssl-default"

## @section Service parameters
service:
  type: ClusterIP
  annotations: {}
  ports:
    port: 80
    targetPort: 80

## @section Ingress / Gateway parameters
ingress:
  external:
    enabled: true
    host: "app.example.com"
    hosts: []
    sectionNames: []
    ingressClassName: "nginx"
    tls:
      secretCertificate: ""
      configs: []

  internal:
    enabled: false
    host: "app-internal.example.com"
    hosts: []
    sectionNames: []
    ingressClassName: "nginx"
    tls:
      secretCertificate: ""
      configs: []

## @section GCP parameters
healthCheck:
  requestPath: /healthcheck

gcpBackendPolicy:
  timeoutSec: 360
  logging:
    enabled: false
    sampleRate: 500000

pdb:
  enabled: false
  minAvailable: ""

scaledObject:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    cpu:
      value: 80
    memory:
      value: 90
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 600
          policies:
          - type: Pods
            value: 1
            periodSeconds: 120
        scaleUp:
          stabilizationWindowSeconds: 0
