apiVersion: v2
name: app-front
description: |
  A generic Helm chart for deploying frontend Single Page Applications (SPA) on Kubernetes.
  The application image is expected to bundle its own web server (e.g., NGINX or Node.js).
  Supports KEDA autoscaling, GKE Gateway API HTTPRoutes, NGINX Ingress,
  GCP HealthCheckPolicy, and PodDisruptionBudget.
type: application
version: 1.1.0
appVersion: "1.0.0"
home: https://github.com/gdennye/charts
sources:
  - https://github.com/gdennye/charts
keywords:
  - frontend
  - spa
  - react
  - vue
  - angular
  - kubernetes
  - keda
  - autoscaling
  - gke
maintainers:
  - name: gdennye
    url: https://github.com/gdennye
icon: https://raw.githubusercontent.com/gdennye/charts/main/assets/app-front.png
