## @section Global parameters
## @param name [string] Application name, used as prefix for all Kubernetes resources. **Required.**
## @param namespace [string] Kubernetes namespace to deploy into. **Required.**
## @param timezone [string] Timezone injected as TZ environment variable.
name: ""
namespace: ""
timezone: "America/Sao_Paulo"

## @section Deployment parameters
deployment:
  ## @param deployment.revisionHistoryLimit Number of old ReplicaSets to retain.
  revisionHistoryLimit: 1
  ## @param deployment.progressDeadlineSeconds Seconds before a stalled deployment is considered failed.
  progressDeadlineSeconds: 3600

  strategy:
    ## @param deployment.strategy.type Deployment strategy: `RollingUpdate` or `Recreate`.
    type: RollingUpdate
    rollingUpdate:
      ## @param deployment.strategy.rollingUpdate.maxSurge Max extra pods during a rolling update.
      maxSurge: 1
      ## @param deployment.strategy.rollingUpdate.maxUnavailable Max unavailable pods during a rolling update.
      maxUnavailable: 1

  image:
    ## @param deployment.image.repository Container image repository.
    repository: ""
    ## @param deployment.image.tag Container image tag.
    tag: ""
    ## @param deployment.image.pullPolicy Image pull policy.
    pullPolicy: IfNotPresent

  ## @param deployment.resources Resource requests and limits for the main container.
  resources: {}
  # resources:
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi

  ports:
    http:
      ## @param deployment.ports.http.containerPort HTTP port the container listens on.
      containerPort: 80

  probes:
    readiness:
      ## @param deployment.probes.readiness.path HTTP path for the readiness probe.
      path: /healthcheck
      port: 80
      failureThreshold: 4
      periodSeconds: 15
      successThreshold: 1
      timeoutSeconds: 10
    startup:
      ## @param deployment.probes.startup.path HTTP path for the startup probe.
      path: /healthcheck
      port: 80
      successThreshold: 1
      failureThreshold: 8
      periodSeconds: 10
    liveness:
      ## @param deployment.probes.liveness.path HTTP path for the liveness probe.
      path: /healthcheck
      port: 80
      successThreshold: 1
      failureThreshold: 4
      periodSeconds: 15
      timeoutSeconds: 10

  ## @param deployment.extraEnv Extra environment variables for the main container.
  extraEnv: []

  ## @param deployment.extraEnvFrom Additional envFrom sources (Secrets, ConfigMaps).
  extraEnvFrom: []

  ## @param deployment.extraVolumeMounts Extra volume mounts for the main container.
  extraVolumeMounts: []

  ## @param deployment.extraVolumes Extra volumes to add to the pod spec.
  extraVolumes: []

  nodeSelector:
    ## @param deployment.nodeSelector.nodeTypePoolSpec Node pool label for scheduling. Leave empty to skip.
    nodeTypePoolSpec: ""

  ## @param deployment.tolerations Pod scheduling tolerations.
  ## Example:
  ## tolerations:
  ##   - key: "nodepool"
  ##     operator: "Equal"
  ##     value: "standard"
  ##     effect: "NoSchedule"
  tolerations: []

  ## @param deployment.terminationGracePeriodSeconds Graceful termination period in seconds.
  terminationGracePeriodSeconds: 120

  ## NGINX volume mounts (paths for SSL secrets, used internally when TLS terminates at pod level)
  volumeMounts:
    nginx:
      mountPath: {}
    ssl:
      mountPath: "/etc/nginx/ssl"
    ssl-default:
      mountPath: "/etc/nginx/ssl-default"

## @section Service parameters
service:
  ## @param service.type Kubernetes service type.
  type: ClusterIP
  ## @param service.annotations Annotations to add to the Service.
  annotations: {}
  ports:
    ## @param service.ports.port Service port.
    port: 80
    ## @param service.ports.targetPort Target port on the pod.
    targetPort: 80

## @section Ingress / Gateway parameters
ingress:
  external:
    ## @param ingress.external.enabled Enable external Ingress.
    enabled: false
    ## @param ingress.external.host Primary external hostname.
    host: ""
    ## @param ingress.external.hosts Additional hostnames (overrides `host`).
    hosts: []
    ## @param ingress.external.sectionNames Gateway API section names for the HTTPRoute.
    sectionNames: []
    ## @param ingress.external.ingressClassName Ingress class name.
    ingressClassName: "nginx"
    tls:
      secretCertificate: ""
      configs: []

  internal:
    ## @param ingress.internal.enabled Enable internal Gateway API HTTPRoute.
    enabled: false
    ## @param ingress.internal.host Primary internal hostname.
    host: ""
    ## @param ingress.internal.hosts Additional hostnames (overrides `host`).
    hosts: []
    ## @param ingress.internal.sectionNames Gateway API section names. **Required when enabled.**
    sectionNames: []
    ingressClassName: "nginx"
    tls:
      secretCertificate: ""
      configs: []

## @section GCP parameters
healthCheck:
  ## @param healthCheck.requestPath HTTP path used by the GCP HealthCheckPolicy.
  requestPath: /healthcheck

gcpBackendPolicy:
  ## @param gcpBackendPolicy.timeoutSec Backend timeout in seconds.
  timeoutSec: 360
  logging:
    enabled: false
    sampleRate: 500000

## @section PodDisruptionBudget
pdb:
  ## @param pdb.enabled Enable PodDisruptionBudget.
  enabled: false
  ## @param pdb.minAvailable Minimum available pods (integer or percentage).
  minAvailable: ""

## @section KEDA autoscaling
scaledObject:
  ## @param scaledObject.enabled Enable KEDA ScaledObject.
  enabled: true
  ## @param scaledObject.minReplicaCount Minimum replicas.
  minReplicaCount: 1
  ## @param scaledObject.maxReplicaCount Maximum replicas.
  maxReplicaCount: 10
  triggers:
    cpu:
      value: 80
    memory:
      value: 90
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 600
          policies:
          - type: Pods
            value: 1
            periodSeconds: 120
        scaleUp:
          stabilizationWindowSeconds: 0