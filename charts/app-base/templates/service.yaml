apiVersion: v1
kind: Service
metadata:
  name: {{ required "A value for 'name' is required!" .Values.name }}-service
  namespace: {{ required "A value for 'namespace' is required!" .Values.namespace }}
  {{- if .Values.service.annotations }}
  annotations:
    {{- toYaml .Values.service.annotations | nindent 4 }}
  {{- end }}
  labels:
    app: {{ .Values.name }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Values.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.ports.port | default 80 }}
      targetPort: {{ .Values.service.ports.targetPort | default 80 }}
      name: http
