# Default values for app-base.
# This chart is optimized for backend applications.

## @section Global parameters
## @param name [string] Name of the application. Used as a prefix for all resources. **Required.**
name: "app-base"
## @param namespace [string] Kubernetes namespace to deploy into. **Required.**
namespace: "default"
## @param timezone [string] Timezone for the pod environment variable TZ.
timezone: "America/Sao_Paulo"

## @section Deployment parameters
deployment:
  ## @param deployment.revisionHistoryLimit Number of old ReplicaSets to retain.
  revisionHistoryLimit: 1
  ## @param deployment.progressDeadlineSeconds Max seconds for deployment to make progress before considered failed.
  progressDeadlineSeconds: 3600

  ## @param deployment.strategy.type Deployment strategy type. `RollingUpdate` or `Recreate`.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      ## @param deployment.strategy.rollingUpdate.maxSurge Max pods above the desired count during a rolling update.
      maxSurge: 1
      ## @param deployment.strategy.rollingUpdate.maxUnavailable Max pods unavailable during a rolling update.
      maxUnavailable: 1

  ## @param deployment.image.repository Container image repository.
  ## @param deployment.image.tag Container image tag.
  ## @param deployment.image.pullPolicy Image pull policy. `Always`, `IfNotPresent`, or `Never`.
  image:
    repository: "nginx"
    tag: "latest"
    pullPolicy: IfNotPresent

  ## @param deployment.resources Resource requests and limits for the main container.
  resources: {}

  ## @param deployment.ports.http.containerPort HTTP port exposed by the container.
  ports:
    http:
      containerPort: 80

  ## @section Probe parameters
  probes:
    readiness:
      path: /health/ready
      port: 80
      failureThreshold: 4
      periodSeconds: 15
      successThreshold: 1
      timeoutSeconds: 10
    startup:
      path: /health/live
      port: 80
      successThreshold: 1
      failureThreshold: 8
      periodSeconds: 10
    liveness:
      path: /health/live
      port: 80
      successThreshold: 1
      failureThreshold: 4
      periodSeconds: 15
      timeoutSeconds: 10

  volumeMounts:
    appsettings:
      enabled: false
      mountPath: /app/appsettings.json
      subPath: appsettings.json
      secretName: ""
    apiKey:
      enabled: false
      mountPath: /app/apis-key.json
      subPath: apis-key.json
      secretName: ""

  extraVolumeMounts: []
  extraVolumes: []

  cloudsqlProxy:
    enabled: false
    image:
      repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
      tag: "2.11.4"
    instances: ""
    credentialsSecretName: ""
    resources:
      requests:
        cpu: 10m
        memory: 32Mi

  extraEnv: []
  extraEnvFrom: []

  nodeSelector:
    nodeTypePoolSpec: ""

  tolerations: []
  terminationGracePeriodSeconds: 120

## @section Service parameters
service:
  type: ClusterIP
  annotations: {}
  ports:
    port: 80
    targetPort: 80

## @section Ingress parameters
ingress:
  external:
    enabled: false
    host: "api.example.com"
    hosts: []
    sectionNames: []
    ingressClassName: "nginx"
    tls:
      secretCertificate: ""
      configs: []
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "360"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "360"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
      nginx.ingress.kubernetes.io/send-timeout: "180"

  internal:
    enabled: false
    host: "api-internal.example.com"
    hosts: []
    sectionNames: []
    ingressClassName: "nginx"
    tls:
      secretCertificate: ""
      configs: []
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "360"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "360"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
      nginx.ingress.kubernetes.io/send-timeout: "180"

healthCheck:
  requestPath: /health/ready

gcpBackendPolicy:
  timeoutSec: 360
  logging:
    enabled: false
    sampleRate: 500000

pdb:
  enabled: false
  minAvailable: ""

scaledObject:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    cpu:
      value: 80
    memory:
      value: 90
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 600
          policies:
          - type: Pods
            value: 1
            periodSeconds: 120
        scaleUp:
          stabilizationWindowSeconds: 0
