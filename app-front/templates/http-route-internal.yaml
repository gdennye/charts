{{- if $.Values.ingress.internal.enabled }}
{{- $hosts := .Values.ingress.internal.hosts | default (list .Values.ingress.internal.host) }}
{{- range $index, $host := $hosts }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ required "A value for 'name' is required!" $.Values.name }}-{{ $index }}-http-route-i
  namespace: {{ $.Values.namespace }}
spec:
  parentRefs:
  {{- if $.Values.ingress.internal.sectionNames }}
  {{- range $.Values.ingress.internal.sectionNames }}
  - name: gateway-internal
    namespace: gateway-internal
    sectionName: {{ . }}
  {{- end }}
  {{- else }}
  - name: gateway-internal
    namespace: gateway-internal
  {{- end }}
  hostnames:
  - {{ $host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ required "A value for 'name' is required!" $.Values.name }}-service
      port: {{ $.Values.service.ports.port | default 80 }}
{{- end }}
{{- end }}
