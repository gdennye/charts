  app-front-nginx:
  - apiVersion: v2
    appVersion: 1.0.0
    created: "2026-05-14T17:04:33.149372191Z"
    description: 'A generic Helm chart for deploying frontend Single Page Applications
      (SPA) where NGINX is managed by the chart itself via a ConfigMap. Supports HTTP-only
      mode (external Ingress) and HTTPS/SSL termination at the pod level (internal
      mode with TLS secrets). Supports KEDA autoscaling, GKE Gateway API HTTPRoutes,
      NGINX Ingress, GCP HealthCheckPolicy, and PodDisruptionBudget. '
