    description: 'A generic Helm chart for deploying frontend Single Page Applications
      (SPA) on Kubernetes. The application image is expected to bundle its own web
      server (e.g., NGINX or Node.js). Supports KEDA autoscaling, GKE Gateway API
      HTTPRoutes, NGINX Ingress, GCP HealthCheckPolicy, and PodDisruptionBudget. '
